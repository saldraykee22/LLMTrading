version: '3.8'

services:
  aegis-bot:
    build: .
    container_name: aegis_trading_bot
    restart: unless-stopped
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    command: python cli.py run --symbol BTC/USDT --interval 1h --watchdog

  aegis-dashboard:
    build: .
    container_name: aegis_dashboard
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: python -m uvicorn dashboard.app:app --host 0.0.0.0 --port 8000

  prometheus:
    image: prom/prometheus:latest
    container_name: aegis_prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
