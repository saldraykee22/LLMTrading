version: "3.8"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-trading-bot
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "9090:9090"
    networks:
      - trading-net
    restart: unless-stopped
    depends_on:
      - dashboard
    command: ["--symbol", "BTC/USDT"]

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-trading-dashboard
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - trading-net
    restart: unless-stopped
    entrypoint: ["python", "dashboard/server.py"]
    command: []

  prometheus:
    image: prom/prometheus:latest
    container_name: llm-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - trading-net
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"

  grafana:
    image: grafana/grafana:latest
    container_name: llm-grafana
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/dashboard.json
    networks:
      - trading-net
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  trading-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
