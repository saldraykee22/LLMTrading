global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: trading-bot
    static_configs:
      - targets: ['bot:8000']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: dashboard
    static_configs:
      - targets: ['dashboard:8000']
    metrics_path: /metrics
    scrape_interval: 15s
