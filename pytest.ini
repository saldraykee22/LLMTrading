# ============================================================
# Pytest Configuration
# ============================================================

[pytest]
# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage options
# addopts = --cov=. --cov-report=term-missing --cov-report=html

# Logging
log_cli = false
log_cli_level = INFO

# Asyncio support (pytest-asyncio required)
asyncio_mode = auto
