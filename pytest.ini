# ============================================================
# Pytest Configuration
# ============================================================
# Asyncio mode for async tests
# ============================================================

[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage options
# addopts = --cov=. --cov-report=term-missing --cov-report=html

# Logging
log_cli = false
log_cli_level = INFO
