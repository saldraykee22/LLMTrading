name: 🐛 Bug Report
description: Report a system error or unexpected behavior.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us improve Aegis Terminal!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Explain the problem you encountered in detail.
      placeholder: e.g., The bot failed to send an order for BTC/USDT...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce?
      description: How can we get this error? Write step by step.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Log Records
      description: Please paste the relevant part of the `logs/trading.log` file here.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version
      description: The bot version you are using (e.g., v1.0.0).
    validations:
      required: true
